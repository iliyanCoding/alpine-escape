<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpine Escape</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100 bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <section class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">Alpine Escape</a>
        </section>
    </nav>

    <main class="container flex-grow-1">
        {% block main_content %}{% endblock %}
    </main>

    <footer class="mt-auto py-4 bg-dark text-light">
        <section class="container">
            <p class="text-secondary small mb-0 text-center">A CS1116 project built with Flask &amp; Bootstrap.</p>
        </section>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
