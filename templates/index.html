{% extends "base.html" %}

{% block main_content %}
<article class="row justify-content-center mt-3">
    <section class="col-auto">
        <canvas id="root"></canvas>

        <div id="score-panel" class="hidden mt-3 text-center">
            <form id="score-form" class="d-flex gap-2 justify-content-center align-items-end">
                <section>
                    <label for="username-input" class="form-label mb-1">Save your score?</label>
                    <input type="text" id="username-input" class="form-control" maxlength="16" placeholder="Enter name" autocomplete="off">
                </section>
                <button type="submit" id="save-btn" class="btn btn-primary">Save</button>
                <button type="button" id="skip-btn" class="btn btn-secondary">Skip</button>
            </form>
        </div>
    </section>

    <section class="col-auto">
        <div class="card bg-secondary bg-opacity-25 border-secondary" style="width: 250px;">
            <div class="card-header text-center fw-bold fs-5">Top Scores</div>
            <ol id="score-list" class="list-group list-group-flush list-group-numbered">
            </ol>
        </div>
    </section>
</article>

<script src="/js/main.js" type="module"></script>
{% endblock %}
